name: OpenSSF Scorecard

# Automated security posture scoring against the OpenSSF Scorecard ruleset:
#   https://github.com/ossf/scorecard
#
# Score appears in the Security tab + can be embedded as a badge.
# Catches regressions in: dangerous workflows, missing branch protection,
# unpinned actions, weak deps, exposed secrets, missing license, etc.
#
# Triggers:
#   - branch_protection_rule (fires when branch protection config changes)
#   - Weekly Saturday cron (keeps the score fresh as new checks ship)
#   - Push to main (catches just-shipped regressions)

on:
  branch_protection_rule:
  schedule:
    - cron: "0 13 * * 6"
  push:
    branches: [main]

permissions:
  contents: read
  security-events: write
  id-token: write
  actions: read

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout (full history needed by Scorecard)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Run Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a  # v2
        # Soft-fail on transient external unavailability (GitHub code-search
        # API rate-limiting the OSS-Fuzz check with 429s, or upstream
        # Sigstore/Fulcio/TUF signing errors) rather than reddening this
        # repo's CI for issues outside this repo's control.
        continue-on-error: true
        with:
          results_file: results.sarif
          results_format: sarif
          # publish_results: false avoids the public Sigstore transparency-log
          # signing step (Fulcio/TUF), which is the other external failure
          # mode for this action. Score still gets written to the SARIF file
          # and uploaded to the repo's own Security tab below.
          publish_results: false

      - name: Upload SARIF (so Security tab shows findings)
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9  # v3
        with:
          sarif_file: results.sarif

      - name: Upload artifact (raw JSON downloadable from the run)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 30
